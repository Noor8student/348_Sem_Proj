<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NBA Custom Player Database</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f4f4f4;
    }

    nav a {
      margin-right: 15px;
      text-decoration: none;
      font-weight: bold;
      color: #0044aa;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #eaeaea;
    }

    form {
      background: white;
      padding: 15px;
      border: 1px solid #ccc;
      margin-top: 20px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    .summary-box {
      background: white;
      padding: 15px;
      border: 1px solid #ccc;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('players') }}">Manage Players</a>
    <a href="{{ url_for('report') }}">Filter Report</a>
  </nav>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
